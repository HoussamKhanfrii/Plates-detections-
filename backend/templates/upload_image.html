{% extends "base.html" %}

{% block title %}PlateVision | Image Detection{% endblock %}
{% block page_title %}Image Detection{% endblock %}

{% block content %}
<div class="workspace-grid two-column">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Single image inference</p>
                <h2>Upload an image</h2>
            </div>
            <i data-lucide="image-up"></i>
        </div>

        <form id="imageUploadForm" class="upload-form">
            <label class="drop-zone" for="imageInput" data-drop-zone>
                <input id="imageInput" name="image" type="file" accept="image/*" hidden>
                <i data-lucide="upload-cloud"></i>
                <strong>Drop image here</strong>
                <span>PNG, JPG, JPEG, BMP, WEBP</span>
            </label>
            <div class="preview-frame">
                <img id="imagePreview" alt="Uploaded preview">
            </div>
            <button class="btn primary wide" type="submit">
                <i data-lucide="scan-search"></i>
                Detect Plate
            </button>
        </form>
    </section>

    <section class="panel result-panel">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Recognition output</p>
                <h2>Result</h2>
            </div>
            <div class="loader hidden" id="imageLoader"></div>
        </div>
        <div id="imageResult" class="empty-state">
            <i data-lucide="scan-line"></i>
            <p>Results will appear here after processing.</p>
        </div>
    </section>
</div>
{% endblock %}
